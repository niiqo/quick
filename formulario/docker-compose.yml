version: "3.9"

services:
  db:
    image: mariadb:10.4
    container_name: quick_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db4ftndih4hblv
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db4ftndih4hblv.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  web:
    build: .
    container_name: quick_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: db4ftndih4hblv
      DB_USER: root
      DB_PASS: root

volumes:
  db_data:
